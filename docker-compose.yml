services:
  gsloc-proxy:
    build:
      context: .
    image: gsloc-proxy:local
    restart: unless-stopped
    ports:
      - "${GSLOC_COMPOSE_BIND:-127.0.0.1}:${GSLOC_PROXY_PORT:-8082}:8082"
      - "${GSLOC_COMPOSE_BIND:-127.0.0.1}:${GSLOC_MANAGE_PORT:-8090}:8090"
    environment:
      GSLOC_MANAGE_USER: "${GSLOC_MANAGE_USER:-admin}"
      GSLOC_MANAGE_PASSWORD: "${GSLOC_MANAGE_PASSWORD:-}"
      GSLOC_LOG_LEVEL: "${GSLOC_LOG_LEVEL:-info}"
      GSLOC_TERMINAL_LOG_LEVEL: "${GSLOC_TERMINAL_LOG_LEVEL:-info}"
      GSLOC_FILE_LOG_LEVEL: "${GSLOC_FILE_LOG_LEVEL:-info}"
      GSLOC_LOG_FORMAT: "${GSLOC_LOG_FORMAT:-jsonl}"
      GSLOC_LOG_MAX_BYTES: "${GSLOC_LOG_MAX_BYTES:-10485760}"
      GSLOC_LOG_BACKUP_COUNT: "${GSLOC_LOG_BACKUP_COUNT:-5}"
    volumes:
      - type: bind
        source: ${GSLOC_POLICY_FILE:-./proxy/policy.example.json}
        target: /config/policy.json
        read_only: true
        bind:
          create_host_path: false
      - gsloc-proxy-data:/data

volumes:
  gsloc-proxy-data:
