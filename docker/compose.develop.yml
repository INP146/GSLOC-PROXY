name: gsloc-proxy

services:
  gsloc-proxy:
    image: ghcr.io/inp146/gsloc-proxy:develop
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:8090:8090"
    environment:
      GSLOC_MANAGE_USER: "admin"
      GSLOC_MANAGE_PASSWORD: ""
      GSLOC_LOG_LEVEL: "info"
      GSLOC_TERMINAL_LOG_LEVEL: "info"
      GSLOC_FILE_LOG_LEVEL: "info"
      GSLOC_LOG_FORMAT: "jsonl"
      GSLOC_LOG_MAX_BYTES: "10485760"
      GSLOC_LOG_BACKUP_COUNT: "5"
    volumes:
      - gsloc-proxy-data:/data

volumes:
  gsloc-proxy-data:
